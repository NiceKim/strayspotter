services:
  nginx:
      image: nginx:alpine
      ports:
        - "8080:80"
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf
      depends_on:
        - frontend
        - app
      networks:
        - app-network
      restart: unless-stopped
  # Node.js backend service
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network
    restart: unless-stopped

  # Next.js frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped


networks:
  app-network:
    driver: bridge