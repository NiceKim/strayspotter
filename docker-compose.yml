services:
  # Nginx reverse proxy service
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - app
    networks:
      - app-network
    restart: unless-stopped

  # Node.js backend service
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    restart: unless-stopped

  # Next.js frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped


networks:
  app-network:
    driver: bridge 