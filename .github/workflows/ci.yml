name: CI

on:
  push:
    branches: ["development"]
  pull_request:
    branches: ["development"]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: backend
      - run: npm run test:unit -- --ci
        working-directory: backend

  backend-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: backend
      - run: npm run test:integration -- --ci
        working-directory: backend
