openapi: 3.0.0
info:
  version: 1.0.1
  title: My API
  description: This is a sample server Stray Spotter
servers:
  - url: http://127.0.0.1:3000
    description: Development server
paths:
  /api/images:
    get:
      summary: Retrieves a paginated list of posts for gallery rendering
      description: |
        Returns post rows used by the gallery, including picture key and optional uploader account ID.
        Results are ordered by post creation time in descending order.
      parameters:
        - in: query
          name: maxKeys
          required: false
          schema:
            type: integer
            default: 100
            example: 10
          description: Maximum number of posts to return. Defaults to 100 if omitted.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
            example: 0
          description: Number of posts to skip for pagination.
      responses:
        '200':
          description: A list of post objects for gallery rendering.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Post ID.
                    picture_id:
                      type: integer
                      description: Associated picture ID.
                    picture_key:
                      type: string
                      description: S3 object key for the picture.
                    user_id:
                      type: integer
                      nullable: true
                      description: Owning user ID, or null for anonymous posts.
                    account_id:
                      type: string
                      nullable: true
                      description: Uploader account ID from users table, or null for anonymous posts.
                    created_at:
                      type: string
                      format: date-time
                      description: Post creation timestamp.
  /api/image-url:
    get:
      summary: Generates a pre-signed URL.
      description: Generates a pre-signed URL from the cloud.
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
          description: The key of the image in the cloud.
      responses:
        '200':
          description: A JSON object containing the pre-signed URL. On internal errors, a fallback URL is returned in the same field.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: The pre-signed URL to access the image.
        '400':
          description: Bad Request. Missing key query parameter.
  /api/pictures/reports:
    get:
      summary: Generates a report based on the provided parameters
      description: |
        Generates a report based on the specified time frame ('daily' or 'monthly') and optional status filter.
        For daily reports, startDate and endDate are required.
        For monthly reports, month parameter is required in YYYY-MM format.
      parameters:
        - in: query
          name: timeFrame
          required: true
          schema:
            type: string
            enum: [daily, monthly]
          description: The type of report to generate
        - in: query
          name: statusFilter
          required: false
          schema:
            type: integer
            enum: [0, 1, 2]
          description: Optional filter for cat status. 0=good, 1=concerned, 2=critical
        - in: query
          name: startDate
          required: false
          schema:
            type: string
            format: date
            example: "2024-03-01"
          description: Required for daily reports - Start date in YYYY-MM-DD format
        - in: query
          name: endDate
          required: false
          schema:
            type: string
            format: date
            example: "2024-03-31"
          description: Required for daily reports - End date in YYYY-MM-DD format
        - in: query
          name: month
          required: false
          schema:
            type: string
            example: "2024-03"
          description: Required for monthly reports - Month in YYYY-MM format
      responses:
        '200':
          description: The report data containing records and totals
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    description: Array of result rows
                    items:
                      type: object
                      properties:
                        date_taken:
                          type: string
                          description: Date (for daily reports)
                        year_week:
                          type: string
                          description: Year and week (for weekly/monthly reports, may be absent)
                        district_no:
                          type: integer
                          description: District number
                        record_count:
                          type: integer
                          description: Record count for the given district/period
                  totals:
                    type: object
                    description: Aggregated totals
                    properties:
                      byPeriod:
                        type: object
                        additionalProperties:
                          type: integer
                        description: Total count per period (date/month, etc.)
                      byDistrict:
                        type: object
                        additionalProperties:
                          type: integer
                        description: Total count per district
                      overall:
                        type: integer
                        description: Grand total
        '400':
          description: Bad Request - Missing or invalid parameters
          content:
            application/json:
              schema:
                type: string
                description: Error message explaining the validation failure
        '500':
          description: Internal server error if report generation fails
          content:
            application/json:
              schema:
                type: string
                description: Error message explaining the cause of failure
  /api/pictures/{id}/classification:
    get:
      summary: Classifies an image as a cat or not
      description: |
        Calls an external classification server to classify an image as a cat or not.
      parameters:
        - name: id
          in: path
          description: The image ID for classification.
          required: true
          schema:
            type: string
      responses:
        200:
          description: A JSON response indicating whether the image is classified as a cat
          content:
            application/json:
              schema:
                type: object
                properties:
                  isCat:
                    type: boolean
                    description: Indicates if the image is classified as a cat (true/false).
  /api/pictures/counts:
    get:
      summary: Retrieves the current count of cat pictures
      description: |
        Returns the count of cat pictures for different time periods (day, week, month).
      responses:
        '200':
          description: Successfully retrieved cat picture counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  day:
                    type: integer
                    description: Number of pictures taken today
                  week:
                    type: integer
                    description: Number of pictures taken in the last 7 days
                  month:
                    type: integer
                    description: Number of pictures taken this month
        '500':
          description: Internal server error if count retrieval fails
          content:
            application/json:
              schema:
                type: string
                description: Error message explaining the cause of failure
  /api/pictures/{id}/gps:
    get:
      summary: Retrieves GPS coordinates for a specific picture
      description: |
        Retrieves GPS coordinates (latitude and longitude) for a given picture ID from the database.
      parameters:
        - name: id
          in: path
          description: The ID of the picture (numeric string).
          required: true
          schema:
            type: string
            pattern: '^\d+$'
      responses:
        '200':
          description: Successfully retrieved GPS coordinates
          content:
            application/json:
              schema:
                type: object
                properties:
                  latitude:
                    type: number
                    format: double
                    description: Latitude coordinate of the picture location
                  longitude:
                    type: number
                    format: double
                    description: Longitude coordinate of the picture location
        '400':
          description: Bad Request - Missing or invalid picture ID parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message explaining the validation failure
        '404':
          description: Picture not found for the given ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message when the picture ID does not exist
        '500':
          description: Internal server error if GPS data retrieval fails
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message explaining the cause of failure
  /api/posts:
    post:
      summary: Uploads a cat picture and creates a new post
      description: |
        Uploads an image file, processes EXIF data, stores metadata (latitude, longitude, etc.), and uploads the image to cloud storage.
        Creates a post for either an authenticated user (via Bearer token) or an anonymous user.
        For anonymous uploads, anonymousNickname and anonymousPassword are required. For authenticated uploads, provide a valid Authorization header.
      parameters:
        - in: header
          name: Authorization
          required: false
          schema:
            type: string
          description: Optional Bearer access token (`Bearer &lt;token&gt;`). When omitted, the upload is treated as anonymous.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
                - status
              properties:
                image:
                  type: string
                  format: binary
                  description: The image file to upload.
                status:
                  type: integer
                  enum: [0, 1, 2]
                  description: Cat status. 0=good, 1=concerned, 2=critical.
                anonymousNickname:
                  type: string
                  description: Nickname for anonymous uploads. Required when no authenticated user is provided.
                anonymousPassword:
                  type: string
                  format: password
                  description: Password for anonymous uploads. Required when no authenticated user is provided.
      responses:
        '201':
          description: Successfully uploaded the image and created a post. Returns a plain text success message.
          content:
            text/plain:
              schema:
                type: string
                example: "Picture successfully uploaded"
        '400':
          description: Missing or invalid fields (e.g. file, status, or required anonymous credentials).
          content:
            text/plain:
              schema:
                type: string
                description: Error message explaining the validation failure.
        '500':
          description: Internal server error during file upload, EXIF data parsing, or database insertion.
          content:
            text/plain:
              schema:
                type: string
                description: Error message detailing the cause of the failure.

  /api/posts/mine:
    get:
      summary: Retrieves posts created by the authenticated user
      description: |
        Returns a paginated list of posts uploaded by the currently authenticated user.
        Requires a valid Bearer access token.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer access token (`Bearer <token>`).
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 10
            example: 10
          description: Maximum number of posts to return.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
            example: 0
          description: Number of posts to skip for pagination.
      responses:
        '200':
          description: Successfully retrieved posts for the authenticated user.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Post ID.
                    picture_id:
                      type: integer
                      description: Associated picture ID.
                    user_id:
                      type: integer
                      description: Authenticated user ID.
                    created_at:
                      type: string
                      format: date-time
                      description: Post creation timestamp.
                    picture_key:
                      type: string
                      description: S3 object key for the picture.
                    cat_status:
                      type: integer
                      enum: [0, 1, 2]
                      description: Cat status. 0=good, 1=concerned, 2=critical.
        '401':
          description: Missing or invalid access token.
        '500':
          description: Internal server error while fetching user posts.

  /api/posts/mine/count:
    get:
      summary: Retrieves the post count of the authenticated user
      description: |
        Returns the total number of non-deleted posts uploaded by the currently authenticated user.
        Requires a valid Bearer access token.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer access token (`Bearer <token>`).
      responses:
        '200':
          description: Successfully retrieved the post count for the authenticated user.
          content:
            application/json:
              schema:
                type: integer
                example: 12
        '401':
          description: Missing or invalid access token.
        '500':
          description: Internal server error while fetching user post count.

  /api/posts/{id}:
    delete:
      summary: Deletes a post (soft delete)
      description: |
        Soft-deletes the post and its associated picture (logical delete).
        Data remains in the database but is excluded from default queries.
        Authenticated users can delete their own posts with a Bearer token; for anonymous posts, provide anonymousPassword in the request body.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID of the post to delete.
        - in: header
          name: Authorization
          required: false
          schema:
            type: string
          description: Bearer token. Required when deleting a post owned by an authenticated user.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                anonymousPassword:
                  type: string
                  format: password
                  description: Required when deleting an anonymous post.
      responses:
        '200':
          description: Post and associated picture were soft-deleted successfully.
          content:
            text/plain:
              schema:
                type: string
                example: "Post deleted successfully"
        '400':
          description: Missing id or anonymousPassword when required.
        '403':
          description: Unauthorized to delete this post.
        '404':
          description: Post or anonymous post record not found.
        '500':
          description: Failed to soft-delete the post or picture.

  /api/posts/{id}/likes:
    get:
      summary: Retrieves like count for a post
      description: Returns the total number of likes for the specified post ID.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID of the post.
      responses:
        '200':
          description: Successfully retrieved like count.
          content:
            application/json:
              schema:
                type: integer
                example: 12
        '400':
          description: Missing post ID.

    post:
      summary: Likes a post
      description: |
        Ensures the authenticated user has liked the specified post.
        This endpoint is idempotent and returns `changed: false` when the user already liked the post.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID of the post.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer access token (`Bearer <token>`).
      responses:
        '200':
          description: Like state ensured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  changed:
                    type: boolean
                    description: Whether a new like row was created.
                  message:
                    type: string
                    example: Post liked successfully
        '400':
          description: Missing post ID or user ID.
        '401':
          description: Missing or invalid access token.

    delete:
      summary: Unlikes a post
      description: |
        Ensures the authenticated user has no like on the specified post.
        This endpoint is idempotent and returns `changed: false` when no like row existed.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID of the post.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer access token (`Bearer <token>`).
      responses:
        '200':
          description: Unlike state ensured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  changed:
                    type: boolean
                    description: Whether an existing like row was deleted.
                  message:
                    type: string
                    example: Post unliked successfully
        '400':
          description: Missing post ID or user ID.
        '401':
          description: Missing or invalid access token.

  /api/users/register:
    post:
      summary: Registers a new user
      description: Registers a new user with account ID, password, and email, and issues access/refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountId
                - password
                - email
              properties:
                accountId:
                  type: string
                  description: Unique account identifier for the user.
                password:
                  type: string
                  format: password
                  description: Plain-text password to be hashed and stored.
                email:
                  type: string
                  format: email
                  description: User email address.
      responses:
        '201':
          description: User successfully registered. Returns an access token and basic user info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Short-lived access token.
                  user:
                    type: object
                    properties:
                      userId:
                        type: integer
                      accountId:
                        type: string
                      email:
                        type: string
        '400':
          description: Missing fields or duplicate email/accountId.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: Internal server error during registration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/users/login:
    post:
      summary: Authenticates a user and issues tokens
      description: Authenticates a user by account ID and password, then issues access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountId
                - password
              properties:
                accountId:
                  type: string
                  description: Account identifier used for login.
                password:
                  type: string
                  format: password
                  description: Plain-text password for authentication.
      responses:
        '200':
          description: Login successful. Returns an access token and user info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      userId:
                        type: integer
                      accountId:
                        type: string
                      email:
                        type: string
        '400':
          description: Missing accountId or password.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Invalid accountId or password.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/users/details:
    get:
      summary: Retrieves details of the currently authenticated user
      description: Returns basic profile information for the authenticated user.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer access token (`Bearer &lt;token&gt;`) for the authenticated user.
      responses:
        '200':
          description: Successfully retrieved user details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:
                    type: string
                  email:
                    type: string
                  joinedDate:
                    type: string
                    format: date-time
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/users/refresh:
    post:
      summary: Issues a new short-lived access token
      description: |
        Issues a new short-lived access token for the authenticated user based on a valid refresh token cookie.
        The refresh token is expected to be present in an HTTP-only `refreshToken` cookie.
      responses:
        '200':
          description: Successfully issued a new access token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Missing or invalid refresh token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: Internal server error while refreshing the token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /health:
    get:
      summary: Health check
      description: Returns server status for monitoring or load balancer health checks.
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                    description: Health status message